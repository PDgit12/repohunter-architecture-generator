# LoRA training configuration for Project RepoHunter
# Optimized for Apple Silicon M4 (16GB RAM)

# The model to fine-tune (Hugging Face repo or local path)
model: "mlx-community/Meta-Llama-3-8B-Instruct-4bit"

# Path to the data directory ({train, valid, test}.jsonl)
data: "github_repohunter/training/data"

# Training hyperparameters
train: true
iters: 1000
batch_size: 4
learning_rate: 1e-5
steps_per_report: 10
steps_per_eval: 50
val_batches: 25
save_every: 100
adapter_path: "github_repohunter/training/adapters"

# LoRA specific parameters
lora_parameters:
  rank: 8
  alpha: 16
  dropout: 0.05
  scale: 10.0

# Performance optimizations
grad_checkpoint: true
max_seq_length: 2048
